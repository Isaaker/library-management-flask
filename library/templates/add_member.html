{% extends 'layout.html' %}
{% block body %}
<br>
<h1>Añadir socio</h1>
{% from "includes/_formhelpers.html" import render_field %}
<form method="POST" action="">
    {{ form.hidden_tag() }}
    <div class="form-group">{{ render_field(form.name, class_="form-control") }}</div><br>
    <div class="form-group">{{ render_field(form.email, class_="form-control", type="email") }}</div>
    <br>
    <p><button type="submit" class="btn btn-primary">Guardar</button></p>
</form>
{% endblock %}
